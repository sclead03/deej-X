# process names are case-insensitive
# you can use 'master' to indicate the master channel, or a list of process names to create a group
# you can use 'mic' to control your mic input level (uses the default recording device)
# you can use 'deej.unmapped' to control all apps that aren't bound to any slider (this ignores master, system, mic and device-targeting sessions)
# lists are allowed on each channel; [app1.exe, app2.exe] or formatted as:
#  - app1.exe
#  - app2.exe

# windows only - you can use 'deej.current' to control the currently active app (whether full-screen or not)
# windows only - you can use a device's full name, i.e. "Speakers (Realtek High Definition Audio)", to bind it. this works for both output and input devices
# windows only - you can use 'system' to control the "system sounds" volume

# number of active fader channels (0–5); firmware ignores OLEDs, buttons, and faders beyond this count
# 0 = master-only mode (no channel OLEDs, faders, or mute buttons)
num_sliders: 5

# physical gap between adjacent OLED active pixel areas, expressed in pixel-equivalent units (0–100)
# run the display_spacing tool to measure: gap pixels = label number × 8
# firmware stores this in EEPROM and uses it on the next boot for the startup ship animation
display_gap_pixels: 58

# remap physical fader order without reflashing firmware
# fader_order[i] = which physical fader position (0-4) feeds logical slot i
# example: swap faders 0 and 1 → [1, 0, 2, 3, 4]
fader_order: [0, 1, 2, 3, 4]

# set this to true if you want the controls inverted (i.e. top is 0%, bottom is 100%)
invert_sliders: false

# physical faders rarely reach an exact 0 or 100% reading even fully bottomed/topped out.
# raw readings within this percent of either physical extreme snap to the true endpoint,
# so "fader all the way down" reliably means true 0 no matter what volume_curve/floor is
# set. Does not apply to the master encoder (slot 0), which isn't a physical potentiometer.
fader_deadzone_percent: 1

# settings for connecting to SERENITY
com_port: COM9
baud_rate: 115200

# adjust the amount of signal noise reduction depending on your hardware quality
# supported values are "low" (excellent hardware), "default" (regular hardware) or "high" (bad, noisy hardware)
noise_reduction: default

# how a slider's physical position is converted into a volume value
# "linear" - slider position maps straight to volume (default)
# "log" - slider position maps to a dB value between volume_curve_db_floor and 0dB (full up),
#         which is then converted to volume; matches how real mixing console faders feel,
#         since human hearing perceives loudness on a logarithmic scale, not a linear one
# only applies to the physical faders (slots 1-5) - the master encoder (slot 0) is always
# linear, 1:1 with the host's 0-100% volume, regardless of this setting
volume_curve: log

# only used when volume_curve is "log" - the dB level treated as "fully down" on the slider
# (0dB, unity gain, is always "fully up" and isn't configurable). -60 is the standard
# convention for "practically silent" in audio engineering. Must be between -120 and -1
# -20 
volume_curve_db_floor: -40

# directory containing PNG icon files for channel OLEDs; relative to deej-x.exe or absolute
icon_dir: icons

# SERENITY channel layout: index 0 = master volume encoder, indices 1-5 = analog faders
slider_mapping:
  0: master
  1: firefox.exe
  2: spotify.exe
  3: deej.unmapped
  4: deej.steam
  5: zoom.exe

# display names for SERENITY OLEDs; 0 = master encoder label, 1-5 = fader OLEDs (match slider_mapping keys)
# Accented characters supported: é, É, ü, Ü, ö, Ö, ä, Ä, ñ, Ñ
# Supported ASCII symbols: ! " # $ % & ' ( ) * + , - . / : ; < = > ? @ [ \ ] ^ _  { | } ~`
# 15-character limit
channel_names:
  0: MASTER
  1: Firefox
  2: Spotify
  3: Unmapped
  4: Steam
  5: Zoom

# RGB button (mic mute button) action
# actions: mic_mute_toggle (default), mute_mic, unmute_mic, masterVol_mute
# Note: play_pause / skip_forward / skip_back are not available here — those are
# sent as firmware HID Consumer Control reports and the host has no equivalent path.
rgb_button:
  action: mic_mute_toggle

# encoder button click window in milliseconds (default 250, range 50–1000)
# controls how long the firmware waits for a follow-up click before firing a gesture
# firmware adds 40ms debounce headroom on top of this value internally
encoder_click_window_ms: 250

# idle time in seconds before the OLED screensaver engages (default 180, range 30–1800)
# resets on any fader/button/encoder/RGB-button input
screensaver_timeout_s: 180

# encoder button gesture configuration
# actions: masterVol_mute, play_pause, skip_forward, skip_back, mute_mic, unmute_mic
# Note: mute_mic and unmute_mic require a firmware update to support action IDs 4/5.
encoder_gestures:
  single_click: masterVol_mute
  double_click: play_pause
  triple_click: skip_forward

# D16 (PF7) auxiliary button gesture configuration — identical single/double/triple
# click handling to the encoder button above (same click window, same action IDs);
# NC on current PCB revision, reserved for future revision
d16_button:
  single_click: masterVol_mute
  double_click: play_pause
  triple_click: skip_forward

# mic mute button behavior: which capture devices are muted/unmuted on each press
# targets are case-insensitive friendly-name substrings, e.g. "Razer Microphone"
# mute.all   → mute every active capture device
# unmute.all → unmute every active capture device
# lists are supported: unmute_action: ["Razer BlackShark V2 Pro", "Realtek USB Audio"]
mic_mute:
  mute_action: mute.all
  unmute_action: unmute.all

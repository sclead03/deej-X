# process names are case-insensitive
# you can use 'master' to indicate the master channel, or a list of process names to create a group
# you can use 'mic' to control your mic input level (uses the default recording device)
# you can use 'deej.unmapped' to control all apps that aren't bound to any slider (this ignores master, system, mic and device-targeting sessions)
# windows only - you can use 'deej.current' to control the currently active app (whether full-screen or not)
# windows only - you can use a device's full name, i.e. "Speakers (Realtek High Definition Audio)", to bind it. this works for both output and input devices
# windows only - you can use 'system' to control the "system sounds" volume
# SERENITY channel layout: index 0 = master volume encoder, indices 1-5 = analog faders
slider_mapping:
  0: master
  1: chrome.exe
  2: spotify.exe
  3: discord.exe
  4: deej.unmapped
  5: deej.unmapped

# display names for SERENITY channel OLEDs (indices 0-4, corresponding to faders 1-5)
channel_names:
  - Browser
  - Spotify
  - Discord
  - Game
  - Aux

# set this to true if you want the controls inverted (i.e. top is 0%, bottom is 100%)
invert_sliders: false

# physical faders rarely reach an exact 0 or 100% reading even fully bottomed/topped out.
# raw readings within this percent of either physical extreme snap to the true endpoint,
# so "fader all the way down" reliably means true 0 no matter what volume_curve/floor is
# set. Does not apply to the master encoder (slot 0), which isn't a physical potentiometer.
fader_deadzone_percent: 1

# settings for connecting to SERENITY
com_port: COM4
baud_rate: 115200

# adjust the amount of signal noise reduction depending on your hardware quality
# supported values are "low" (excellent hardware), "default" (regular hardware) or "high" (bad, noisy hardware)
noise_reduction: default

# how a slider's physical position is converted into a volume value
# "linear" - slider position maps straight to volume (default)
# "log" - slider position maps to a dB value between volume_curve_db_floor and 0dB (full up),
#         which is then converted to volume; matches how real mixing console faders feel,
#         since human hearing perceives loudness on a logarithmic scale, not a linear one
volume_curve: linear

# only used when volume_curve is "log" - the dB level treated as "fully down" on the slider
# (0dB, unity gain, is always "fully up" and isn't configurable). -60 is the standard
# convention for "practically silent" in audio engineering. Must be between -120 and -1
volume_curve_db_floor: -60
